<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>待つべき？動くべき？｜恋のオラクル三択鑑定</title>
  <meta name="description" content="あなた/お相手の生年月日と関係性を入れて、3枚のオラクルから1枚選ぶだけ。現状・過去・未来（近未来）・今後の一手を“結論だけ”先に受け取れる無料鑑定。" />
  <style>
    :root{
      --bg: radial-gradient(circle at top left,#ffe5f3 0,#fff7ff 40%,#ffeaf2 85%);
      --card:#fff;
      --ink:#1f1f1f;
      --muted:#6c6168;
      --line:#f0d6e2;
      --accent:#ff6ba5;
      --accent2:#ff9bc8;
      --shadow:0 18px 40px rgba(210,140,180,.35);
      --soft:0 10px 24px rgba(0,0,0,.08);
      --r-lg:28px;
      --r-md:20px;
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0}
    body{
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Kaku Gothic ProN","Yu Gothic","YuGothic",sans-serif;
      background:var(--bg);
      color:var(--ink);
      padding:24px 12px 40px;
    }
    .page{
      max-width:980px;
      margin:0 auto;
      background:linear-gradient(145deg,rgba(255,255,255,.92),rgba(255,245,252,.97));
      border-radius:32px;
      box-shadow:var(--shadow);
      padding:22px 18px 28px;
      position:relative;
      overflow:hidden;
    }
    .page::before{
      content:"";
      position:absolute;
      inset:-60px -40px auto auto;
      background:radial-gradient(circle at top,#ffe7f7 0,transparent 60%);
      opacity:.7;
      pointer-events:none;
    }
    .inner{position:relative;z-index:1}

    .chip{
      display:inline-flex;align-items:center;gap:6px;
      padding:4px 10px;border-radius:999px;
      background:rgba(255,255,255,.9);
      border:1px solid rgba(255,192,216,.7);
      font-size:11px;color:#b34a77;margin-bottom:10px;
    }
    .dot{width:7px;height:7px;border-radius:50%;
      background:linear-gradient(135deg,#ff77aa,#ffb4e0);
      box-shadow:0 0 8px rgba(255,105,180,.7);
    }

    h1{margin:0 0 8px;font-size:26px;line-height:1.5;letter-spacing:.04em}
    h1 span{display:block}
    .sub{margin:0 0 12px;font-size:13px;color:var(--muted);line-height:1.7}
    .note{margin:0 0 14px;font-size:11px;color:#a08a96;line-height:1.7}

    .panel{
      background:rgba(255,255,255,.95);
      border:1px solid rgba(255,210,232,.9);
      box-shadow:var(--soft);
      border-radius:var(--r-lg);
      padding:14px 14px 16px;
    }

    .form{
      display:flex;flex-wrap:wrap;gap:10px;align-items:flex-end;
      border-bottom:1px dashed var(--line);
      padding-bottom:12px;margin-bottom:12px;
    }
    label{font-size:12px;color:#4a3941;font-weight:800}
    .field{display:flex;flex-direction:column;gap:6px;min-width:160px}
    input,select{
      width:180px;max-width:100%;
      padding:9px 10px;border-radius:12px;
      border:1px solid #f0cde2;background:#fff;
      font-size:14px;
    }
    .hint{font-size:11px;color:var(--muted);margin-top:2px}

    .picker{
      display:flex;flex-wrap:wrap;gap:18px;justify-content:space-between;
      margin-top:12px;
    }
    .tcard{
      flex:1 1 30%;
      max-width:300px;
      border:none;background:transparent;padding:0;
      cursor:pointer;text-align:left;
    }
    .tcard:focus-visible{outline:2px solid #ff9dcf;outline-offset:3px}
    .shell{
      background:var(--card);
      border:1px solid rgba(255,210,230,.8);
      border-radius:var(--r-md);
      box-shadow:var(--soft);
      overflow:hidden;
      transition:transform .18s ease, box-shadow .18s ease, border .18s ease;
      height:100%;
      display:flex;flex-direction:column;
    }
    .tcard:hover .shell{transform:translateY(-3px);box-shadow:0 18px 38px rgba(0,0,0,.12)}
    .tcard[aria-pressed="true"] .shell{
      transform:translateY(-1px) scale(1.01);
      box-shadow:0 20px 40px rgba(228,118,162,.35);
      border:1px solid #ff8fbe;
    }
    .art{background:#fdf3f8}
    .art img{display:block;width:100%;height:auto;max-height:320px;object-fit:cover}
    .txt{padding:10px 14px 14px}
    .name{margin:0 0 6px;font-size:14px;font-weight:900}
    .desc{margin:0;font-size:12px;line-height:1.7;color:var(--muted)}

    .foot{margin-top:10px;font-size:11px;color:#9b8190}
    .foot b{color:#c25a86}

    .result{margin-top:16px;display:none}
    .resultBox{
      margin-top:12px;
      border-radius:var(--r-lg);
      background:rgba(255,255,255,.97);
      border:1px solid rgba(229,190,216,.9);
      box-shadow:var(--soft);
      padding:14px 14px 16px;
    }
    .rtag{display:flex;align-items:center;gap:8px;font-size:11px;color:#b14c7e;margin-bottom:8px}
    .rtag .rdot{width:10px;height:10px;border-radius:999px;background:conic-gradient(from 160deg,#ff9bc5,#ffc3dd,#ff9bc5);box-shadow:0 0 12px rgba(255,140,190,.55)}
    .rtitle{margin:0 0 6px;font-size:15px;font-weight:1000}
    .rmeta{margin:0 0 10px;font-size:11px;color:#7a626e;line-height:1.7}
    .rmeta b{color:#b14c7e}

    .grid{display:grid;grid-template-columns:1fr;gap:10px}
    .sec{
      border:1px dashed #efc2de;
      background:linear-gradient(120deg,#fff7fc,#fffdfc);
      border-radius:16px;
      padding:10px 12px;
    }
    .sec h3{margin:0 0 6px;font-size:12px}
    .sec p{margin:0;font-size:12px;line-height:1.85;color:#3a2b32}

    .lock{
      margin-top:10px;border-radius:16px;border:1px solid #f2d6e6;background:rgba(255,255,255,.95);
      padding:12px;position:relative;overflow:hidden;
    }
    .lock::before{
      content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.1),rgba(255,255,255,.95));
      pointer-events:none;
    }
    .lockInner{filter:blur(6px);opacity:.75;user-select:none;line-height:1.7;font-size:12px;color:#6a5661}

    .ctaRow{display:flex;flex-wrap:wrap;gap:10px;align-items:center;justify-content:space-between;margin-top:12px}
    .btn{
      display:inline-flex;align-items:center;gap:8px;
      padding:10px 16px;border-radius:999px;border:none;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      color:#fff;font-weight:1000;font-size:13px;letter-spacing:.04em;
      cursor:pointer;box-shadow:0 12px 26px rgba(212,80,140,.45);
      text-decoration:none;
      white-space:nowrap;
    }
    .btn::after{content:"▶";font-size:10px;opacity:.9}
    .mini{font-size:11px;color:#7a626e;line-height:1.7}
    .mini b{color:#b14c7e}

    .lineCta{
      margin-top:14px;padding:14px;border-radius:var(--r-lg);
      background:linear-gradient(135deg,#ffe5f5,#fff2fb);
      border:1px solid rgba(230,150,189,.85);
      box-shadow:0 14px 30px rgba(222,120,170,.28);
    }
    .lineCta h2{margin:0 0 6px;font-size:14px}
    .lineCta p{margin:0 0 10px;font-size:12px;line-height:1.8;color:#583d4a}
    .lineBtn{
      display:inline-flex;align-items:center;gap:8px;
      padding:10px 16px;border-radius:999px;
      background:#06C755;color:#fff;font-weight:1000;font-size:13px;
      text-decoration:none;box-shadow:0 12px 26px rgba(0,0,0,.12);
    }
    .lineBtn::after{content:"▶";font-size:10px;opacity:.9}

    .reset{margin-top:10px;text-align:right}
    .reset button{
      border:none;background:transparent;color:#9a6f8a;text-decoration:underline;
      font-size:11px;cursor:pointer;padding:4px 0;
    }

    @media (max-width:768px){
      body{padding:12px 8px 24px}
      .page{border-radius:22px;padding:18px 12px 24px}
      h1{font-size:20px}
      input,select{width:150px}

      /* スマホでも3枚横並び（画像小さめ） */
      .picker{gap:8px}
      .tcard{flex:1 1 30%;max-width:110px}
      .art img{max-height:170px}
      .txt{padding:8px 10px 10px}
      .name{font-size:12px;margin-bottom:4px}
      .desc{font-size:10.5px}
      .btn{font-size:12px}
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="inner">
      <div class="chip"><span class="dot"></span>恋に悩むあなたへ・無料オラクル三択鑑定</div>

      <h1>
        <span>待つべき？動くべき？</span>
        <span>その迷いに、あなたが“選ぶ”三択オラクル。</span>
      </h1>

      <p class="sub">
        あなた/お相手の生年月日と関係性、そしてカードを1枚。<br>
        「現状／過去／未来（近未来）／今後どうすればいいか」を、まずは<b>結論だけ</b>受け取れます（背中押し寄り）。
      </p>
      <p class="note">※結果は「今の状態」をもとにしたメッセージです。現実を強制するものではありません。</p>

      <section class="panel" id="cards">
        <div class="form">
          <div class="field">
            <label for="rel">関係性</label>
            <select id="rel">
              <option value="crush">片想い</option>
              <option value="dating">曖昧/付き合う前</option>
              <option value="couple">交際中</option>
              <option value="ex">元彼/元カノ（復縁）</option>
              <option value="nocontact">音信不通/未読無視</option>
              <option value="married">夫婦/パートナー</option>
            </select>
            <div class="hint">いちばん近いものを選んでOK</div>
          </div>

          <div class="field">
            <label for="bdYou">あなたの生年月日</label>
            <input id="bdYou" inputmode="numeric" autocomplete="bday" placeholder="例：19990101" maxlength="8" />
            <div class="hint">8桁（
