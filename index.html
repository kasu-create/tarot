<script>
  var PAY_URL = "PAY_URL_HERE";
  var GAS_REGISTER_URL = "https://script.google.com/macros/s/AKfycbzSjdhPUH-aliY08WBqHkYOKx88lH_0zCc5QdyjzzltScTIUKaC59-bVGLremUzMe9U/exec";
  var WEBHOOK_SECRET = "tarot-20260320-secret-9XkP7mL2";
  var STATE_KEY = "oracle_state_v4";

  var $ = function(s){ return document.querySelector(s); };
  var rel = $("#rel"), bdYou = $("#bdYou"), bdThem = $("#bdThem"), startBtn = $("#startBtn");
  var step0 = $("#step0"), step1 = $("#step1"), step2 = $("#step2"), step3 = $("#step3"), step4 = $("#step4"), step5 = $("#step5");
  var metaLine = $("#metaLine"), tendencyGrid = $("#tendencyGrid"), toCardsBtn = $("#toCardsBtn");
  var cards = document.querySelectorAll(".tcard"), resultMeta = $("#resultMeta"), summaryGrid = $("#summaryGrid");
  var payBtn = $("#payBtn"), fullBtn = $("#fullBtn"), copyLinkBtn = $("#copyLinkBtn"), carryLinkWrap = $("#carryLinkWrap"), carryLink = $("#carryLink");
  var restartBtn = $("#restartBtn"), reselectBtn = $("#reselectBtn");
  var codeBox = $("#codeBox"), oracleCodeEl = $("#oracleCode"), copyCodeBtn = $("#copyCodeBtn");

  function digitsOnly8(raw){ return (raw||"").replace(/\D/g,"").slice(0,8); }
  function sumDigits(s){ return (s||"").split("").reduce(function(a,c){ return a + (c>="0"&&c<="9"?Number(c):0); },0); }
  function reduceLifePath(n){ while(n>9){ n=sumDigits(String(n)); } return n||null; }
  function lifePath(yyyymmdd){ var v=digitsOnly8(yyyymmdd); if(v.length!==8) return null; return reduceLifePath(sumDigits(v)); }
  function compatBand(lpYou,lpThem){ if(!lpYou||!lpThem) return "unknown"; var d=Math.abs(lpYou-lpThem); if(d===0) return "high"; if(d<=2) return "mid"; return "low"; }

  function hashString(str){
    str = String(str||"");
    var h = 2166136261;
    for(var i=0;i<str.length;i++){
      h ^= str.charCodeAt(i);
      h = Math.imul(h, 16777619);
    }
    return h>>>0;
  }
  function pickVariant(val, idx){
    if(Array.isArray(val)) return val[idx % val.length];
    return val;
  }

  function saveState(s){ try{ localStorage.setItem(STATE_KEY, JSON.stringify(s)); }catch(e){} }
  function loadState(){ try{ return JSON.parse(localStorage.getItem(STATE_KEY)||"null"); }catch(e){ return null; } }
  function makePayload(state){ return btoa(unescape(encodeURIComponent(JSON.stringify(state)))); }

  async function registerLeadToGAS(obj){
    if(!GAS_REGISTER_URL) throw new Error("GAS URLが未設定です");

    var res = await fetch(GAS_REGISTER_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        secret: WEBHOOK_SECRET,
        action: "registerLead",
        name: obj.name || "",
        birth_self: obj.birthSelf || "",
        birth_partner: obj.birthPartner || "",
        theme: obj.theme || "",
        free_result: obj.freeResult || ""
      })
    });

    var json = await res.json();
    if(!json.ok){
      throw new Error(json.message || "GAS保存に失敗しました");
    }
    return json;
  }

  function checkUnlockAll(){ var p=new URLSearchParams(location.search); if(p.get("unlock")==="all") try{ localStorage.setItem("oracle_unlock_all","1"); }catch(e){} }

  function renderThemeGrid(){
    var grid=$("#themeGrid"), lockMsg=$("#themeLockMsg"), payUrl=( $("#themeLockPayBtn") && $("#themeLockPayBtn").href ) || PAY_URL;
    if(!grid||typeof THEMES==="undefined") return;

    var unlockAll = false; try{ unlockAll = localStorage.getItem("oracle_unlock_all")==="1"; }catch(e){}
    grid.innerHTML="";
    Object.keys(THEMES).forEach(function(id){
      if(id==="default") return;
      var t=THEMES[id], canSelect=t.free||unlockAll;

      var card=document.createElement("button");
      card.type="button";
      card.className="themeCard"+(canSelect?"":" locked");
      card.dataset.themeId=id;
      card.innerHTML="<span class=\"themeCardName\">"+(t.name||id)+"</span><span class=\"themeCardDesc\">"+(t.shortDesc||"")+"</span>"+(t.free?"<span class=\"themeCardBadge\">無料</span>":"");

      card.addEventListener("click",function(){
        if(canSelect){
          lockMsg.style.display="none";
          var state=loadState()||{};
          state.themeId=id; state.v=4; saveState(state);
          step0.classList.remove("show"); step1.classList.add("show");
          step1.scrollIntoView({behavior:"smooth",block:"start"});
        } else {
          lockMsg.style.display="block";
          if($("#themeLockPayBtn")) $("#themeLockPayBtn").href=payUrl;
        }
      });

      grid.appendChild(card);
    });
  }

  function applyCardLabels(){
    var state=loadState(), tid=state&&state.themeId?state.themeId:"default";
    var theme=THEMES[tid]||THEMES.default;
    if(!theme||!theme.cards) return;
    ["A","B","C"].forEach(function(k){
      var el=$("#cardName"+k), el2=$("#cardDesc"+k);
      if(el&&theme.cards[k]) el.textContent=theme.cards[k].name;
      if(el2&&theme.cards[k]) el2.textContent=theme.cards[k].desc;
    });
  }

  function buildReading(cardKey,relKey,youBD,themBD){
    var state=loadState(), tid=state&&state.themeId?state.themeId:"default";
    var theme=THEMES[tid]||THEMES.default, base=theme.base||THEMES.default.base;
    var relTone=(REL_TONE&&REL_TONE[relKey])||REL_TONE.crush;
    var lpYou=lifePath(youBD), lpThem=lifePath(themBD);
    var band=compatBand(lpYou,lpThem), comp=(COMP&&COMP[band])||COMP.unknown;
    var relLabel=(REL_LABEL&&REL_LABEL[relKey])||"関係性";
    var meta={ relLabel:relLabel, compLabel:comp.label, lpYou:lpYou, lpThem:lpThem };

    var seed = hashString([tid,relKey,cardKey,youBD,themBD].join("|"));
    var nowS = pickVariant(base[cardKey].now.s, hashString(seed+"|now"));
    var pastS = pickVariant(base[cardKey].past.s, hashString(seed+"|past"));
    var futureS = pickVariant(base[cardKey].future.s, hashString(seed+"|future"));
    var nextS = pickVariant(base[cardKey].next.s, hashString(seed+"|next"));

    var summary={
      now:{ label:"現状", summary:[nowS, relTone.add, comp.add].join(" ") },
      past:{ label:"過去", summary:[pastS, relTone.add, comp.add].join(" ") },
      future:{ label:"未来（近未来）", summary:[futureS, relTone.add, comp.add].join(" ") },
      next:{ label:"今後どうすればいいか", summary:[nextS, relTone.nudge, comp.add].join(" ") }
    };
    return { meta:meta, summary:summary };
  }

  function renderTendency(relKey,youBD,themBD){
    var lpYou=lifePath(youBD), lpThem=lifePath(themBD), band=compatBand(lpYou,lpThem);
    var comp=(COMP&&COMP[band])||COMP.unknown;
    var relTone=(REL_TONE&&REL_TONE[relKey])||REL_TONE.crush;
    var relLabel=(REL_LABEL&&REL_LABEL[relKey])||"関係性";

    metaLine.innerHTML="関係性：<b>"+relLabel+"</b>／"+comp.label+(lpYou?"（あなた:"+lpYou+(lpThem?"・相手:"+lpThem:"")+")":"");
    tendencyGrid.innerHTML=[
      { h:"2人の空気（無料）", p:comp.add },
      { h:"この関係の勝ち筋（無料）", p:relTone.add },
      { h:"いま一番やるべきこと（無料）", p:relTone.nudge }
    ].map(function(it){ return "<div class=\"sec\"><h3>"+it.h+"</h3><p>"+it.p+"</p></div>"; }).join("");
  }

  function renderSummary(reading){
    var m=reading.meta;
    resultMeta.innerHTML="関係性：<b>"+m.relLabel+"</b>／"+m.compLabel+(m.lpYou?"（あなた:"+m.lpYou+(m.lpThem?"・相手:"+m.lpThem:"")+")":"");
    summaryGrid.innerHTML=[ reading.summary.now, reading.summary.past, reading.summary.future, reading.summary.next ]
      .map(function(it){ return "<div class=\"sec\"><h3>"+it.label+"（結論）</h3><p>"+it.summary+"</p></div>"; }).join("");
  }

  function show(el){ if(el) el.classList.add("show"); }
  function hide(el){ if(el) el.classList.remove("show"); }

  startBtn.addEventListener("click",function(){
    var relKey=rel.value;
    bdYou.value=digitsOnly8(bdYou.value);
    bdThem.value=digitsOnly8(bdThem.value);

    var state=loadState()||{};
    state.v=4; state.rel=relKey;
    state.you=bdYou.value||""; state.them=bdThem.value||"";
    state.card=""; state.ts=Date.now();
    if(!state.themeId) state.themeId="default";
    saveState(state);

    show(step2); hide(step3); hide(step4); hide(step5);
    setTimeout(function(){
      renderTendency(relKey,bdYou.value,bdThem.value);
      hide(step2); show(step3);
      step3.scrollIntoView({behavior:"smooth",block:"start"});
    },1200);
  });

  toCardsBtn.addEventListener("click",function(){
    hide(step3); applyCardLabels(); show(step4);
    step4.scrollIntoView({behavior:"smooth",block:"start"});
  });

  cards.forEach(function(card){
    card.addEventListener("click",function(){
      var relKey=rel.value;
      bdYou.value=digitsOnly8(bdYou.value);
      bdThem.value=digitsOnly8(bdThem.value);

      var cardKey=card.dataset.card;
      var reading=buildReading(cardKey,relKey,bdYou.value,bdThem.value);

      cards.forEach(function(c){ c.setAttribute("aria-pressed","false"); });
      card.setAttribute("aria-pressed","true");

      var state=loadState()||{};
      state.v=4; state.rel=relKey;
      state.you=bdYou.value||""; state.them=bdThem.value||"";
      state.card=cardKey; state.ts=Date.now();
      if(!state.themeId) state.themeId="default";
      saveState(state);

      renderSummary(reading);

      var payload=makePayload(state);
      var fullUrl="full.html#p="+encodeURIComponent(payload);
      fullBtn.href=fullUrl;

      carryLinkWrap.style.display="block";
      carryLink.textContent="発行中...";

      payBtn.href=PAY_URL;

      codeBox.style.display="block";
      oracleCodeEl.textContent="発行中...";
      copyCodeBtn.onclick=null;

      var currentThemeId = (loadState()||{}).themeId || "default";
      var currentTheme = (THEMES[currentThemeId] && THEMES[currentThemeId].name) || "恋愛鑑定";
      var freeResultText = [
        reading.summary.now.summary,
        reading.summary.past.summary,
        reading.summary.future.summary,
        reading.summary.next.summary
      ].join("\n\n");

      registerLeadToGAS({
        name: "相談者",
        birthSelf: bdYou.value || "",
        birthPartner: bdThem.value || "",
        theme: currentTheme,
        freeResult: freeResultText
      }).then(function(result){
        oracleCodeEl.textContent = result.code;
        carryLink.textContent = result.resumeUrl;

        copyCodeBtn.onclick=function(){
          navigator.clipboard.writeText(result.code).then(function(){
            copyCodeBtn.textContent="コピーしました";
            setTimeout(function(){ copyCodeBtn.textContent="コードをコピー"; },1200);
          }).catch(function(){
            alert("コピーできませんでした。コードを長押ししてコピーしてください。");
          });
        };
      }).catch(function(err){
        oracleCodeEl.textContent = "発行失敗";
        carryLink.textContent = "取得できませんでした";
        alert("コード発行に失敗しました: " + err.message);
      });

      show(step5);
      step5.scrollIntoView({behavior:"smooth",block:"start"});
    });
  });

  copyLinkBtn.addEventListener("click",function(){
    var t=carryLink.textContent||"";
    navigator.clipboard.writeText(t).then(function(){
      copyLinkBtn.textContent="コピーしました";
      setTimeout(function(){ copyLinkBtn.textContent="引き継ぎリンクをコピー"; },1200);
    }).catch(function(){ alert("コピーできませんでした。"); });
  });

  restartBtn.addEventListener("click",function(){
    try{ localStorage.removeItem(STATE_KEY); }catch(e){}
    cards.forEach(function(c){ c.setAttribute("aria-pressed","false"); });
    hide(step2); hide(step3); hide(step4); hide(step5);
    show(step0); hide(step1);
    renderThemeGrid();
    step0.scrollIntoView({behavior:"smooth",block:"start"});
  });

  reselectBtn.addEventListener("click",function(){
    cards.forEach(function(c){ c.setAttribute("aria-pressed","false"); });
    hide(step5); show(step4);
    step4.scrollIntoView({behavior:"smooth",block:"start"});
  });

  checkUnlockAll();
  renderThemeGrid();

  var saved=loadState();
  if(saved&&saved.v===4&&saved.themeId){
    rel.value=saved.rel||"crush";
    bdYou.value=saved.you||"";
    bdThem.value=saved.them||"";

    if(!saved.card){
      hide(step0); show(step1);
    } else {
      hide(step0); show(step1);
      renderTendency(saved.rel,saved.you,saved.them);
      show(step3); applyCardLabels(); show(step4);
      var btn=document.querySelector(".tcard[data-card=\""+saved.card+"\"]");
      if(btn) btn.click();
    }
  } else {
    hide(step1); hide(step2); hide(step3); hide(step4); hide(step5);
    show(step0);
  }
</script>
