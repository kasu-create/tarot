<script>
  var PAY_URL = "PAY_URL_HERE";
  var GAS_REGISTER_URL = "https://script.google.com/macros/s/AKfycbzSjdhPUH-aliY08WBqHkYOKx88lH_0zCc5QdyjzzltScTIUKaC59-bVGLremUzMe9U/exec";
  var WEBHOOK_SECRET = "tarot-20260320-secret-9XkP7mL2";
  var STATE_KEY = "oracle_state_v4";

  var THEMES = {
    default: { name: "恋愛鑑定" },
    crush: { name: "片想い" },
    reunion: { name: "復縁" },
    contact: { name: "音信不通" },
    marriage: { name: "結婚" }
  };

  var $ = function(s){ return document.querySelector(s); };
  var rel = $("#rel"), bdYou = $("#bdYou"), bdThem = $("#bdThem"), startBtn = $("#startBtn");
  var step0 = $("#step0"), step1 = $("#step1"), step2 = $("#step2"), step3 = $("#step3"), step4 = $("#step4"), step5 = $("#step5");
  var metaLine = $("#metaLine"), tendencyGrid = $("#tendencyGrid"), toCardsBtn = $("#toCardsBtn");
  var cards = document.querySelectorAll(".tcard"), resultMeta = $("#resultMeta"), summaryGrid = $("#summaryGrid");
  var payBtn = $("#payBtn"), fullBtn = $("#fullBtn"), copyLinkBtn = $("#copyLinkBtn"), carryLinkWrap = $("#carryLinkWrap"), carryLink = $("#carryLink");
  var restartBtn = $("#restartBtn"), reselectBtn = $("#reselectBtn");
  var codeBox = $("#codeBox"), oracleCodeEl = $("#oracleCode"), copyCodeBtn = $("#copyCodeBtn");

  function saveState(s){ try{ localStorage.setItem(STATE_KEY, JSON.stringify(s)); }catch(e){} }
  function loadState(){ try{ return JSON.parse(localStorage.getItem(STATE_KEY)||"null"); }catch(e){ return null; } }
  function digitsOnly8(raw){ return (raw||"").replace(/\D/g,"").slice(0,8); }
  function makePayload(state){ return btoa(unescape(encodeURIComponent(JSON.stringify(state)))); }
  function show(el){ if(el) el.classList.add("show"); }
  function hide(el){ if(el) el.classList.remove("show"); }

  function makeCode(len){
    len = len || 6;
    var chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
    var out = "";
    var arr = new Uint32Array(len);
    crypto.getRandomValues(arr);
    for(var i=0;i<len;i++) out += chars[arr[i] % chars.length];
    return out;
  }

  function registerCodeToGAS(obj){
    if(!GAS_REGISTER_URL) return Promise.reject(new Error("GAS URL未設定"));

    return fetch(GAS_REGISTER_URL, {
      method: "POST",
      mode: "cors",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        secret: WEBHOOK_SECRET,
        action: "registerCode",
        code: obj.code,
        payload: obj.payload
      })
    }).then(function(res){
      return res.json();
    });
  }

  function renderThemeGrid(){
    var grid=$("#themeGrid");
    if(!grid) return;
    grid.innerHTML = [
      {id:"crush", name:"片想い", desc:"今の距離感と進め方を見る"},
      {id:"reunion", name:"復縁", desc:"離れた相手との流れを見る"},
      {id:"contact", name:"音信不通", desc:"連絡の流れを見る"},
      {id:"marriage", name:"結婚", desc:"関係の先を整理する"}
    ].map(function(t){
      return "<button class=\"themeCard\" type=\"button\" data-theme-id=\""+t.id+"\"><span class=\"themeCardName\">"+t.name+"</span><span class=\"themeCardDesc\">"+t.desc+"</span><span class=\"themeCardBadge\">無料</span></button>";
    }).join("");

    document.querySelectorAll(".themeCard").forEach(function(btn){
      btn.addEventListener("click", function(){
        var state = loadState() || {};
        state.themeId = btn.dataset.themeId;
        state.v = 4;
        saveState(state);
        hide(step0);
        show(step1);
      });
    });
  }

  function buildReading(cardKey, relKey){
    var base = {
      A: {
        now: "今は相手も様子見で、動きたくても慎重になりやすい時期です。",
        past: "過去に気持ちのすれ違いか、温度差があったようです。",
        future: "近いうちにやり取りが少しずつ戻る流れがあります。",
        next: "結論を急がず、軽い接点を作ることが一番大事です。"
      },
      B: {
        now: "今は相手の中であなたの存在感が強まっています。",
        past: "過去に安心感を与えた関係性が土台になっています。",
        future: "流れが合えば、距離が縮まりやすいタイミングです。",
        next: "自分から少しだけ柔らかい言葉を返すのが鍵です。"
      },
      C: {
        now: "今は外側の動きより、心の整理が必要な時期です。",
        past: "過去の不安が今の受け取り方に影響している可能性があります。",
        future: "自分の本音が定まるほど、関係の見え方も変わります。",
        next: "相手の気持ちを追う前に、自分がどうしたいかを整えてください。"
      }
    };

    return {
      meta: {
        relLabel: relKey || "恋愛",
        themeLabel: ((THEMES[(loadState()||{}).themeId] || THEMES.default).name)
      },
      summary: {
        now: { label:"現状", summary: base[cardKey].now },
        past: { label:"過去", summary: base[cardKey].past },
        future: { label:"未来（近未来）", summary: base[cardKey].future },
        next: { label:"今後どうすればいいか", summary: base[cardKey].next }
      }
    };
  }

  function renderTendency(relKey){
    metaLine.innerHTML = "関係性：<b>"+relKey+"</b>";
    tendencyGrid.innerHTML = [
      { h:"2人の空気（無料）", p:"今は無理に詰めるより、空気を見ながら距離を調整するのが良い時です。" },
      { h:"この関係の勝ち筋（無料）", p:"感情をぶつけるより、相手が受け取りやすい形に整えることが大切です。" },
      { h:"いま一番やるべきこと（無料）", p:"自分の不安を整理してから動くと、流れが安定しやすくなります。" }
    ].map(function(it){
      return "<div class=\"sec\"><h3>"+it.h+"</h3><p>"+it.p+"</p></div>";
    }).join("");
  }

  function renderSummary(reading){
    resultMeta.innerHTML = "テーマ：<b>"+reading.meta.themeLabel+"</b>／関係性：<b>"+reading.meta.relLabel+"</b>";
    summaryGrid.innerHTML = [
      reading.summary.now,
      reading.summary.past,
      reading.summary.future,
      reading.summary.next
    ].map(function(it){
      return "<div class=\"sec\"><h3>"+it.label+"（結論）</h3><p>"+it.summary+"</p></div>";
    }).join("");
  }

  startBtn.addEventListener("click", function(){
    var relKey = rel.value;
    bdYou.value = digitsOnly8(bdYou.value);
    bdThem.value = digitsOnly8(bdThem.value);

    var state = loadState() || {};
    state.v = 4;
    state.rel = relKey;
    state.you = bdYou.value || "";
    state.them = bdThem.value || "";
    state.card = "";
    state.ts = Date.now();
    if(!state.themeId) state.themeId = "default";
    saveState(state);

    show(step2);
    hide(step3);
    hide(step4);
    hide(step5);

    setTimeout(function(){
      renderTendency(relKey);
      hide(step2);
      show(step3);
    }, 1000);
  });

  toCardsBtn.addEventListener("click", function(){
    hide(step3);
    show(step4);
  });

  cards.forEach(function(card){
    card.addEventListener("click", function(){
      var relKey = rel.value;
      bdYou.value = digitsOnly8(bdYou.value);
      bdThem.value = digitsOnly8(bdThem.value);

      var cardKey = card.dataset.card;
      var reading = buildReading(cardKey, relKey);

      cards.forEach(function(c){ c.setAttribute("aria-pressed","false"); });
      card.setAttribute("aria-pressed","true");

      var state = loadState() || {};
      state.v = 4;
      state.rel = relKey;
      state.you = bdYou.value || "";
      state.them = bdThem.value || "";
      state.card = cardKey;
      state.ts = Date.now();
      if(!state.themeId) state.themeId = "default";
      saveState(state);

      renderSummary(reading);

      var payload = makePayload({
        theme: reading.meta.themeLabel,
        rel: relKey,
        you: bdYou.value || "",
        them: bdThem.value || "",
        result: {
          now: reading.summary.now.summary,
          past: reading.summary.past.summary,
          future: reading.summary.future.summary,
          next: reading.summary.next.summary
        }
      });

      var code = makeCode(6);

      oracleCodeEl.textContent = code;
      codeBox.style.display = "block";
      carryLinkWrap.style.display = "block";
      carryLink.textContent = "発行中...";
      payBtn.href = PAY_URL;

      copyCodeBtn.onclick = function(){
        navigator.clipboard.writeText(code).then(function(){
          copyCodeBtn.textContent = "コピーしました";
          setTimeout(function(){ copyCodeBtn.textContent = "コードをコピー"; }, 1200);
        }).catch(function(){
          alert("コピーできませんでした。コードを長押ししてコピーしてください。");
        });
      };

      registerCodeToGAS({
        code: code,
        payload: payload
      }).then(function(json){
        if(!json.ok){
          throw new Error(json.message || "保存失敗");
        }
        carryLink.textContent = json.resumeUrl || "取得できませんでした";
      }).catch(function(err){
        oracleCodeEl.textContent = "発行失敗";
        carryLink.textContent = "取得できませんでした";
        alert("コード発行に失敗しました: " + err.message);
      });

      show(step5);
    });
  });

  copyLinkBtn.addEventListener("click", function(){
    var t = carryLink.textContent || "";
    navigator.clipboard.writeText(t).then(function(){
      copyLinkBtn.textContent = "コピーしました";
      setTimeout(function(){ copyLinkBtn.textContent = "引き継ぎリンクをコピー"; }, 1200);
    }).catch(function(){
      alert("コピーできませんでした。");
    });
  });

  restartBtn.addEventListener("click", function(){
    try{ localStorage.removeItem(STATE_KEY); }catch(e){}
    cards.forEach(function(c){ c.setAttribute("aria-pressed","false"); });
    hide(step2); hide(step3); hide(step4); hide(step5);
    show(step0); hide(step1);
    renderThemeGrid();
  });

  reselectBtn.addEventListener("click", function(){
    cards.forEach(function(c){ c.setAttribute("aria-pressed","false"); });
    hide(step5);
    show(step4);
  });

  renderThemeGrid();

  var saved = loadState();
  if(saved && saved.v === 4 && saved.themeId){
    rel.value = saved.rel || "片想い";
    bdYou.value = saved.you || "";
    bdThem.value = saved.them || "";

    if(!saved.card){
      hide(step0);
      show(step1);
    } else {
      hide(step0);
      show(step1);
      renderTendency(saved.rel || "片想い");
      show(step3);
      show(step4);
    }
  } else {
    hide(step1); hide(step2); hide(step3); hide(step4); hide(step5);
    show(step0);
  }
</script>
