<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>れんの恋愛鑑定｜恋愛オラクル</title>
  <meta name="description" content="恋愛テーマを選んで、れんの恋愛鑑定。" />
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;600;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap");

    :root{
      /* paid-reading.css のトーンに寄せる（黒×金×ブロンズ） */
      --bg:
        radial-gradient(ellipse 900px 500px at 80% -20%, rgba(212, 175, 55, 0.08) 0%, transparent 55%),
        radial-gradient(ellipse 700px 400px at 10% 110%, rgba(90, 70, 50, 0.25) 0%, transparent 50%),
        #0c0b0a;
      --paper: #1f1c18;
      --surface: #161311;
      --soft: #0c0b0a;
      /* 可読性強化 */
      --ink:#fbf6ee;
      --muted:#d0c1b0;
      --accent:#d4af37; /* gold */
      --accent2:#9a7b2c; /* gold-dim */
      --border:#3d3429;
      --focus: rgba(212,175,55,.55);
      --shadow:0 24px 54px rgba(0,0,0,.42);
      --softShadow:0 12px 28px rgba(0,0,0,.28);
      --r-xl:20px;
      --r-lg:16px;
      --r-md:12px;

      --font-display: "Shippori Mincho","Hiragino Mincho ProN",serif;
      --font-body: "Zen Kaku Gothic New","Hiragino Sans",sans-serif;
    }

    *{ box-sizing:border-box; }
    html,body{ margin:0; padding:0; }

    body{
      font-family:var(--font-body);
      background:var(--bg);
      color:var(--ink);
      padding:20px 12px 40px;
      line-height:1.8;
      font-size:16.5px;
    }

    .page{
      max-width:980px;
      margin:0 auto;
      background:transparent;
      border-radius:var(--r-xl);
      box-shadow:none;
      padding:18px 14px 28px;
    }

    .chip{
      display:inline-flex;
      align-items:center;
      gap:6px;
      padding:4px 10px;
      border-radius:999px;
      background:var(--surface);
      border:1px solid var(--border);
      font-size:11px;
      color:var(--muted);
      margin-bottom:10px;
      letter-spacing:.24em;
    }

    .dot{
      width:7px;
      height:7px;
      border-radius:50%;
      background:linear-gradient(135deg,#e8c76a,var(--accent2));
      box-shadow:0 0 12px rgba(212,175,55,.35);
    }

    h1{
      margin:0 0 8px;
      font-size:26px;
      line-height:1.45;
      font-family:var(--font-display);
      letter-spacing:.02em;
      text-shadow: 0 1px 0 rgba(0,0,0,.35);
    }

    .sub{
      margin:0 0 16px;
      font-size:16px;
      color:var(--muted);
      line-height:1.95;
    }

    .panel{
      display:none;
      margin-top:14px;
      background:var(--paper);
      border:1px solid var(--border);
      border-radius:var(--r-lg);
      box-shadow:var(--softShadow);
      padding:16px 14px 18px;
    }

    .panel.show{ display:block; }

    .panelTitle{
      margin:0 0 10px;
      font-size:17px;
      font-weight:1000;
      color:var(--ink);
      font-family:var(--font-display);
      letter-spacing:.02em;
    }

    .themeGrid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
      gap:12px;
      margin-top:12px;
    }

    .themeCard{
      position:relative;
      border:none;
      border-radius:18px;
      background:var(--surface);
      border:1px solid var(--border);
      box-shadow:var(--softShadow);
      padding:14px 12px;
      text-align:left;
      cursor:pointer;
      transition:transform .18s ease, box-shadow .18s ease;
    }

    .themeCard:hover{
      transform:translateY(-2px);
      box-shadow:0 14px 28px rgba(0,0,0,.3);
    }

    .themeCard.locked{
      background:linear-gradient(160deg, rgba(31,28,24,.92), rgba(22,19,17,.92));
      border:1px dashed rgba(61,52,41,.95);
      cursor:not-allowed;
      color:var(--muted);
      opacity:.92;
    }

    .themeCard.locked:hover{
      transform:none;
      box-shadow:var(--softShadow);
    }

    .themeCard.locked .themeName{
      color:rgba(251,246,238,.92);
      font-weight:1000;
      letter-spacing:.02em;
    }
    .themeCard.locked .themeDesc{
      color:rgba(241,232,220,.88);
      font-size:13.5px;
      line-height:1.85;
    }

    .themeName{
      font-size:16px;
      font-weight:1000;
      margin:0 0 6px;
      color:var(--ink);
    }

    .themeDesc{
      font-size:13px;
      line-height:1.75;
      color:var(--muted);
      margin:0;
    }

    .badgeRow{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-top:10px;
    }

    .badge{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:60px;
      padding:4px 8px;
      border-radius:999px;
      font-size:11px;
      font-weight:1000;
      border:1px solid rgba(212,175,55,.35);
      background:rgba(212,175,55,.14);
      color:var(--accent);
      letter-spacing:.08em;
    }

    .badge.lock{
      background:rgba(212,175,55,.12);
      color:var(--accent);
      border-color:rgba(212,175,55,.35);
    }

    .lockOverlay{
      position:absolute;
      top:10px;
      right:10px;
      font-size:11px;
      font-weight:1000;
      color:var(--accent);
      background:rgba(22,19,17,.88);
      border:1px solid rgba(212,175,55,.35);
      padding:4px 8px;
      border-radius:999px;
      letter-spacing:.12em;
    }

    .form{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:10px;
      margin-top:10px;
    }

    .field{
      display:flex;
      flex-direction:column;
      gap:6px;
    }

    .field.full{
      grid-column:1 / -1;
    }

    label{
      font-size:13px;
      font-weight:1000;
      color:#c9a87a;
    }

    input,select,textarea{
      width:100%;
      padding:11px 12px;
      border-radius:10px;
      border:1px solid var(--border);
      background:var(--surface);
      font-size:14px;
      color:var(--ink);
    }

    input:focus,select:focus,textarea:focus{
      outline:2px solid var(--focus);
      outline-offset:1px;
    }

    textarea{
      min-height:110px;
      resize:vertical;
    }

    .hint{
      font-size:12px;
      color:var(--muted);
      line-height:1.75;
    }

    .actions{
      margin-top:14px;
      display:flex;
      flex-wrap:wrap;
      gap:10px;
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      padding:12px 16px;
      border:1px solid rgba(154,123,44,.55);
      border-radius:999px;
      background:linear-gradient(135deg,#f0d27b 0%, #d4af37 45%, #9a7b2c 100%);
      color:#1a1408;
      text-decoration:none;
      font-size:13px;
      font-weight:1000;
      cursor:pointer;
      min-height:44px;
      box-shadow: 0 10px 26px rgba(212,175,55,.14), 0 10px 22px rgba(0,0,0,.28);
      transition: transform .12s ease, filter .12s ease, box-shadow .12s ease;
    }
    .btn:hover{
      filter: brightness(1.03);
      transform: translateY(-1px);
      box-shadow: 0 14px 34px rgba(212,175,55,.18), 0 14px 28px rgba(0,0,0,.32);
    }
    .btn:active{
      transform: translateY(0);
      filter: brightness(1.05);
    }

    .btn.ghost{
      background:rgba(22,19,17,.6);
      border:1px solid rgba(212,175,55,.22);
      color:var(--ink);
      box-shadow: none;
    }
    .btn.ghost:hover{
      background:rgba(22,19,17,.78);
      border-color: rgba(212,175,55,.35);
      transform: translateY(-1px);
    }

    .loading{
      display:flex;
      align-items:center;
      gap:10px;
      border:1px dashed var(--border);
      border-radius:18px;
      background:var(--surface);
      padding:12px;
    }

    .spinner{
      width:16px;
      height:16px;
      border-radius:50%;
      border:3px solid rgba(212,175,55,.25);
      border-top-color:var(--accent);
      animation:spin 1s linear infinite;
      flex:0 0 auto;
    }

    @keyframes spin{
      to{ transform:rotate(360deg); }
    }

    .summaryGrid{
      display:grid;
      grid-template-columns:1fr;
      gap:10px;
      margin-top:10px;
    }

    .summaryBox{
      border:1px solid var(--border);
      background:var(--surface);
      border-radius:16px;
      padding:12px;
    }

    .summaryBox h3{
      margin:0 0 6px;
      font-size:14px;
      color:var(--accent);
      font-family:var(--font-display);
      letter-spacing:.04em;
    }

    .summaryBox p{
      margin:0;
      font-size:14px;
      line-height:1.9;
      white-space:pre-wrap;
      color:var(--ink);
    }

    .cards{
      display:flex;
      flex-wrap:wrap;
      gap:12px;
      justify-content:space-between;
      margin-top:12px;
    }

    .cardBtn{
      flex:1 1 30%;
      max-width:300px;
      min-width:110px;
      padding:0;
      background:transparent;
      border:none;
      cursor:pointer;
      border-radius:16px;
    }

    .cardBtn[aria-pressed="true"]{
      outline:2px solid rgba(212,175,55,.55);
      outline-offset:4px;
    }

    .cardBtn img{
      display:block;
      width:100%;
      height:auto;
      border-radius:12px;
      box-shadow:var(--softShadow);
      border:1px solid rgba(61,52,41,.85);
      background:linear-gradient(160deg,#2e2a22 0%, #141210 100%);
    }

    .resultHero{
      border-radius:20px;
      border:1px solid var(--border);
      background:var(--surface);
      padding:16px;
      margin-bottom:14px;
    }

    .resultHeroTitle{
      margin:0 0 8px;
      font-size:18px;
      color:var(--accent);
      font-weight:1000;
      font-family:var(--font-display);
    }

    .resultHeroText{
      margin:0;
      line-height:1.9;
      color:var(--ink);
      white-space:pre-wrap;
    }

    .toolGrid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:12px;
      margin-top:16px;
    }

    .toolCard{
      border:1px solid var(--border);
      background:var(--surface);
      border-radius:18px;
      box-shadow:var(--softShadow);
      padding:16px;
    }

    .toolCard h3{
      margin:0 0 8px;
      font-size:16px;
      color:var(--ink);
      font-family:var(--font-display);
    }

    .toolCard p{
      margin:0 0 12px;
      font-size:14px;
      line-height:1.8;
      color:var(--muted);
    }

    .lockMessage{
      margin-top:12px;
      padding:12px;
      border-radius:16px;
      background:rgba(22,19,17,.9);
      border:1px solid var(--border);
      color:var(--muted);
      font-size:13px;
      line-height:1.8;
    }

    @media (max-width:768px){
      body{ padding:12px 8px 24px; }
      .page{ padding:16px 12px 22px; border-radius:24px; }
      h1{ font-size:22px; }
      .form{ grid-template-columns:1fr; }
      .cards{ gap:8px; }
      .cardBtn{ min-width:92px; }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="chip"><span class="dot"></span>無料版</div>
    <h1>れんの恋愛鑑定</h1>
    <p class="sub">
      無料版では4テーマまで体験できます。
    </p>

    <section class="panel show" id="step0">
      <h2 class="panelTitle">テーマを選んでください</h2>
      <div id="themeGrid" class="themeGrid"></div>
      <div id="lockMessage" class="lockMessage" style="display:none;"></div>
    </section>

    <section class="panel" id="step1">
      <h2 class="panelTitle">内容を入力してください</h2>
      <div class="form">
        <div class="field">
          <label for="rel">関係性</label>
          <select id="rel">
            <option value="片想い">片想い</option>
            <option value="曖昧">曖昧 / 付き合う前</option>
            <option value="交際中">交際中</option>
            <option value="元恋人">元恋人</option>
            <option value="音信不通">音信不通</option>
            <option value="夫婦">夫婦 / パートナー</option>
          </select>
        </div>

        <div class="field">
          <label for="timing">いま一番気になること</label>
          <input id="timing" placeholder="例：連絡が来るか、進展するか" />
        </div>

        <div class="field">
          <label for="bdYou">あなたの生年月日</label>
          <input id="bdYou" inputmode="numeric" maxlength="8" placeholder="例：19990101" />
        </div>

        <div class="field">
          <label for="bdThem">お相手の生年月日</label>
          <input id="bdThem" inputmode="numeric" maxlength="8" placeholder="不明なら空欄" />
        </div>

        <div class="field full">
          <label for="memo">補足メモ</label>
          <textarea id="memo" placeholder="最近の状況や気になることがあれば自由に入力"></textarea>
          <div class="hint">ここに書いた内容は画面の結果づくりに使います。送信はされません。</div>
        </div>
      </div>

      <div class="actions">
        <button class="btn" id="startBtn" type="button">鑑定する</button>
        <button class="btn ghost" id="backToThemesBtn" type="button">テーマ選択に戻る</button>
      </div>
    </section>

    <section class="panel" id="step2">
      <h2 class="panelTitle">鑑定しています…</h2>
      <div class="loading">
        <span class="spinner"></span>
        <p>テーマに合わせて流れを整理しています…</p>
      </div>
    </section>

    <section class="panel" id="step3">
      <h2 class="panelTitle">まず、今の流れの全体像です</h2>
      <div class="summaryGrid" id="overviewGrid"></div>
      <div class="actions">
        <button class="btn" id="toCardsBtn" type="button">次へ：カードを選ぶ</button>
        <button class="btn ghost" id="backToFormBtn" type="button">入力に戻る</button>
      </div>
    </section>

    <section class="panel" id="step4">
      <h2 class="panelTitle">3枚のカードから、直感で1枚選んでください</h2>
      <div class="cards">
        <button class="cardBtn" type="button" data-card="A" aria-pressed="false">
          <img id="cardImgA" src="assets/cards/c01.svg" alt="カードA（タロット）" />
        </button>
        <button class="cardBtn" type="button" data-card="B" aria-pressed="false">
          <img id="cardImgB" src="assets/cards/c02.svg" alt="カードB（タロット）" />
        </button>
        <button class="cardBtn" type="button" data-card="C" aria-pressed="false">
          <img id="cardImgC" src="assets/cards/c03.svg" alt="カードC（タロット）" />
        </button>
      </div>
      <div class="actions">
        <button class="btn ghost" id="backToOverviewBtn" type="button">前に戻る</button>
      </div>
    </section>

    <section class="panel" id="step5">
      <h2 class="panelTitle">無料版の鑑定結果</h2>

      <div class="resultHero">
        <p class="resultHeroTitle" id="finalTitle"></p>
        <p class="resultHeroText" id="finalLead"></p>
      </div>

      <div class="summaryGrid" id="resultGrid"></div>

      <div class="toolGrid">
        <div class="toolCard">
          <h3>お悩み相談ツール</h3>
          <p>今の悩みを整理したい時は、こちらの相談ページから続けて確認できます。</p>
          <a class="btn" href="http://192.168.0.231:8501/" target="_blank" rel="noopener noreferrer">お悩み相談へ進む</a>
        </div>

        <div class="toolCard">
          <h3>ストアーズ</h3>
          <p>より深いメニューや今後追加していくサービスは、こちらから確認できます。</p>
          <a class="btn" href="https://lp8hnyu9ebgefokdjdyh.stores.jp/" target="_blank" rel="noopener noreferrer">STORESを見る</a>
        </div>
      </div>

      <div class="actions">
        <button class="btn ghost" id="restartBtn" type="button">最初からやり直す</button>
      </div>
    </section>
  </main>

  <script>
    /*
      テーマ追加はここだけ増やせばOKです。
      free: true なら無料表示
      free: false ならロック表示
    */
    var THEMES = [
      { id: "crush", name: "片想い", desc: "今の距離感と進め方を見ます", free: true },
      { id: "reunion", name: "復縁", desc: "離れた相手との流れを見ます", free: true },
      { id: "silent", name: "音信不通", desc: "連絡の流れや再接点を見ます", free: true },
      { id: "reply_cold", name: "返信がそっけない", desc: "温度差の理由と次の一手を見ます", free: true },

      { id: "encounter", name: "出会い", desc: "新しい恋の入り口を見ます", free: false },

      { id: "marriage", name: "結婚", desc: "関係の先と現実面を整理します", free: false },
      { id: "triangle", name: "複雑恋愛", desc: "言いにくい関係性の流れを見ます", free: false },
      { id: "distance", name: "遠距離恋愛", desc: "距離がある恋の進め方を見ます", free: false },
      { id: "married", name: "既婚者の恋", desc: "慎重さが必要な流れを見ます", free: false }
    ];

    var THEME_TEXT = {
      crush: {
        overview: [
          { title: "今の空気", text: "相手は完全に無関心というより、様子を見ながら距離を測っている状態です。" },
          { title: "進みやすい形", text: "強く動くより、相手が返しやすい軽めの接点が流れを作ります。" },
          { title: "無料版の見どころ", text: "今は押す時か待つ時か、その見極めを中心に整理します。" }
        ]
      },
      reunion: {
        overview: [
          { title: "今の空気", text: "過去の印象は残っていても、相手は慎重に距離を取っている可能性があります。" },
          { title: "進みやすい形", text: "感情のぶつけ直しより、安心感を取り戻す流れが大切です。" },
          { title: "無料版の見どころ", text: "復縁の可能性より先に、今の接点の作り方を整理します。" }
        ]
      },
      silent: {
        overview: [
          { title: "今の空気", text: "連絡が止まっている時ほど、表面より相手の事情や心の余白が影響します。" },
          { title: "進みやすい形", text: "動くにしても、重さより自然さが鍵になります。" },
          { title: "無料版の見どころ", text: "焦って追うより、戻りやすい流れをどう作るかを見ます。" }
        ]
      },
      encounter: {
        overview: [
          { title: "今の空気", text: "恋愛運そのものより、出会いを受け取る姿勢が変化の入口になっています。" },
          { title: "進みやすい形", text: "自分の軸を整えるほど、相性の良い相手が見えやすくなります。" },
          { title: "無料版の見どころ", text: "出会いの有無だけでなく、どんな流れで恋が動くかを整理します。" }
        ]
      },
      reply_cold: {
        overview: [
          { title: "今の空気", text: "返信が急にそっけなく見えるときほど、『嫌われた』と決めつける前に、相手の余裕（忙しさ／気分／距離の取り方）を疑ってみて。気持ちが残っていても、返信のテンポだけが落ちることはよくあります。" },
          { title: "進みやすい形", text: "長文で詰めるより、短く・具体的に・返しやすく。おすすめは“選択式”の一言質問（例：今週どっちが楽？／今夜少し話せる？）。返す負担を下げると温度差は戻りやすいです。" },
          { title: "無料版の見どころ", text: "『考えすぎ？』の不安を整理して、いま動くなら何を・どの順番でやるといいかを短くまとめます。" }
        ]
      }
    };

    /** 78枚のカード画像（assets/cards/c01.svg … c78.svg） */
    var TAROT_DECK_URLS = (function(){
      var a = [];
      for (var i = 1; i <= 78; i++) {
        var n = i < 10 ? "0" + i : String(i);
        a.push("assets/cards/c" + n + ".svg");
      }
      return a;
    })();

    function shuffleCopy(arr){
      var a = arr.slice();
      for (var i = a.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var t = a[i];
        a[i] = a[j];
        a[j] = t;
      }
      return a;
    }

    /** カード選択画面に、デッキからランダムで3枚を表示 */
    function assignThreeRandomCards(){
      var picks = shuffleCopy(TAROT_DECK_URLS).slice(0, 3);
      var ids = ["cardImgA", "cardImgB", "cardImgC"];
      var labels = ["カードA（タロット）", "カードB（タロット）", "カードC（タロット）"];
      for (var k = 0; k < 3; k++) {
        var el = document.getElementById(ids[k]);
        if (el) {
          el.src = picks[k];
          el.alt = labels[k];
        }
      }
    }

    function resetCardImagesToDefault(){
      var defs = [
        { id: "cardImgA", src: "assets/cards/c01.svg" },
        { id: "cardImgB", src: "assets/cards/c02.svg" },
        { id: "cardImgC", src: "assets/cards/c03.svg" }
      ];
      defs.forEach(function(d){
        var el = document.getElementById(d.id);
        if (el) el.src = d.src;
      });
    }

    var CARD_RESULTS = {
      A: {
        tone: "慎重に整える流れ",
        now: "今は感情を一気に動かすより、相手も自分も落ち着いて見ている時期です。",
        past: "過去のすれ違いや温度差が、まだ少しだけ今の反応に影響しています。",
        future: "近いうちに小さなきっかけから流れが戻りやすい兆しがあります。",
        next: "結論を急がず、まずは相手が受け取りやすい形で接点を作ることが大切です。"
      },
      B: {
        tone: "関係がやわらかく動く流れ",
        now: "今は見えないところで相手の中の印象が少しずつ育っています。",
        past: "過去のやり取りの中に、相手が安心していた感覚が残っています。",
        future: "タイミングが合えば、思ったより自然に距離が縮まりやすい流れです。",
        next: "重さよりも親しみやすさを優先すると、相手の反応が変わりやすくなります。"
      },
      C: {
        tone: "気持ちの整理が先に必要な流れ",
        now: "今は外側の変化より、自分の本音や不安の整理が重要な段階です。",
        past: "過去の傷つきや迷いが、今の受け取り方に少し影響しているようです。",
        future: "自分の気持ちが整うほど、関係の見え方も自然に変わっていきます。",
        next: "相手を追う前に、自分が本当に望む形を明確にすることが流れを安定させます。"
      }
    };

    function $(selector){ return document.querySelector(selector); }
    function show(el){ if (el) el.classList.add("show"); }
    function hide(el){ if (el) el.classList.remove("show"); }

    var state = {
      themeId: null,
      themeName: "",
      rel: "",
      timing: "",
      memo: "",
      card: ""
    };

    function renderThemes(){
      var grid = $("#themeGrid");
      var lockMessage = $("#lockMessage");

      grid.innerHTML = THEMES.map(function(theme){
        if(theme.free){
          return [
            '<button class="themeCard" type="button" data-theme-id="', theme.id, '">',
              '<div class="themeName">', theme.name, '</div>',
              '<p class="themeDesc">', theme.desc, '</p>',
              '<div class="badgeRow"><span class="badge">無料</span></div>',
            '</button>'
          ].join("");
        }

        return [
          '<button class="themeCard locked" type="button" data-locked="true" data-theme-name="', theme.name, '">',
            '<div class="lockOverlay">LOCK</div>',
            '<div class="themeName">', theme.name, '</div>',
            '<p class="themeDesc">', theme.desc, '</p>',
            '<div class="badgeRow"><span class="badge lock">準備中</span></div>',
          '</button>'
        ].join("");
      }).join("");

      grid.querySelectorAll(".themeCard").forEach(function(card){
        if(card.dataset.locked === "true"){
          card.addEventListener("click", function(){
            lockMessage.style.display = "block";
            lockMessage.textContent = "「" + card.dataset.themeName + "」は現在準備中です。無料版では、表示されている無料テーマのみ利用できます。";
          });
          return;
        }

        card.addEventListener("click", function(){
          lockMessage.style.display = "none";
          var themeId = card.dataset.themeId;
          var theme = THEMES.find(function(item){ return item.id === themeId; });
          state.themeId = themeId;
          state.themeName = theme ? theme.name : "";
          hide($("#step0"));
          show($("#step1"));
        });
      });
    }

    function renderOverview(){
      var list = (THEME_TEXT[state.themeId] && THEME_TEXT[state.themeId].overview) || [
        { title: "今の空気", text: "今は全体の流れを落ち着いて見極める時期です。" },
        { title: "進みやすい形", text: "感情よりも整ったやり取りが鍵になります。" },
        { title: "無料版の見どころ", text: "今の状況と今後の一手を整理します。" }
      ];

      $("#overviewGrid").innerHTML = list.map(function(item){
        return [
          '<div class="summaryBox">',
            '<h3>', item.title, '</h3>',
            '<p>', item.text, '</p>',
          '</div>'
        ].join("");
      }).join("");
    }

    function renderFinal(cardKey){
      var reading = CARD_RESULTS[cardKey];
      var finalLead = [
        "テーマ: " + state.themeName,
        "関係性: " + state.rel,
        state.timing ? "いま気になること: " + state.timing : "",
        "",
        "今回のカードは「" + reading.tone + "」を示しています。"
      ].filter(Boolean).join("\n");

      $("#finalTitle").textContent = state.themeName + "の無料鑑定結果";
      $("#finalLead").textContent = finalLead;

      var extras = state.memo
        ? "補足メモから見ると、「" + state.memo + "」という気がかりは、すぐ答えを出すより流れを整えていく方が合っています。"
        : "今は気持ちを急いで決めるより、流れを見ながら一手ずつ整える方が結果につながりやすいです。";

      $("#resultGrid").innerHTML = [
        { title: "現状", text: reading.now },
        { title: "過去", text: reading.past },
        { title: "未来（近未来）", text: reading.future },
        { title: "今後どうすればいいか", text: reading.next },
        { title: "今回の補足", text: extras }
      ].map(function(item){
        return [
          '<div class="summaryBox">',
            '<h3>', item.title, '</h3>',
            '<p>', item.text, '</p>',
          '</div>'
        ].join("");
      }).join("");
    }

    $("#backToThemesBtn").addEventListener("click", function(){
      hide($("#step1"));
      show($("#step0"));
    });

    $("#startBtn").addEventListener("click", function(){
      state.rel = $("#rel").value;
      state.timing = $("#timing").value.trim();
      state.memo = $("#memo").value.trim();

      hide($("#step1"));
      show($("#step2"));

      setTimeout(function(){
        hide($("#step2"));
        renderOverview();
        show($("#step3"));
      }, 900);
    });

    $("#backToFormBtn").addEventListener("click", function(){
      hide($("#step3"));
      show($("#step1"));
    });

    $("#toCardsBtn").addEventListener("click", function(){
      assignThreeRandomCards();
      hide($("#step3"));
      show($("#step4"));
    });

    $("#backToOverviewBtn").addEventListener("click", function(){
      hide($("#step4"));
      show($("#step3"));
    });

    document.querySelectorAll(".cardBtn").forEach(function(btn){
      btn.addEventListener("click", function(){
        document.querySelectorAll(".cardBtn").forEach(function(item){
          item.setAttribute("aria-pressed", "false");
        });
        btn.setAttribute("aria-pressed", "true");

        state.card = btn.dataset.card;
        renderFinal(state.card);

        hide($("#step4"));
        show($("#step5"));
      });
    });

    $("#restartBtn").addEventListener("click", function(){
      state = {
        themeId: null,
        themeName: "",
        rel: "",
        timing: "",
        memo: "",
        card: ""
      };

      $("#rel").value = "片想い";
      $("#timing").value = "";
      $("#bdYou").value = "";
      $("#bdThem").value = "";
      $("#memo").value = "";

      document.querySelectorAll(".cardBtn").forEach(function(item){
        item.setAttribute("aria-pressed", "false");
      });

      resetCardImagesToDefault();

      hide($("#step1"));
      hide($("#step2"));
      hide($("#step3"));
      hide($("#step4"));
      hide($("#step5"));
      show($("#step0"));
    });

    renderThemes();
  </script>
</body>
</html>
