<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>鑑定の続き</title>
  <meta name="description" content="無料鑑定の続きを確認するページです。">
  <style>
    :root{
      --bg: radial-gradient(circle at top left,#ffe5f3 0,#fff7ff 40%,#ffeaf2 85%);
      --paper: linear-gradient(145deg,rgba(255,255,255,.94),rgba(255,245,252,.98));
      --ink:#1f1f1f;
      --muted:#6c6168;
      --line:#f0d6e2;
      --accent:#ff6ba5;
      --accent2:#ff9bc8;
      --shadow:0 18px 40px rgba(210,140,180,.35);
      --soft:0 10px 24px rgba(0,0,0,.08);
      --r-xl:32px;
      --r-lg:24px;
      --r-md:18px;
    }
    *{ box-sizing:border-box; }
    html,body{ margin:0; padding:0; }
    body{
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Kaku Gothic ProN","Yu Gothic","YuGothic",sans-serif;
      background:var(--bg);
      color:var(--ink);
      padding:22px 12px 40px;
    }
    .page{
      max-width:860px;
      margin:0 auto;
      background:var(--paper);
      border-radius:var(--r-xl);
      box-shadow:var(--shadow);
      padding:22px 18px 28px;
    }
    .chip{
      display:inline-flex;
      align-items:center;
      gap:6px;
      padding:4px 10px;
      border-radius:999px;
      background:rgba(255,255,255,.9);
      border:1px solid rgba(255,192,216,.7);
      font-size:11px;
      color:#b34a77;
      margin-bottom:10px;
    }
    .dot{
      width:7px;
      height:7px;
      border-radius:50%;
      background:linear-gradient(135deg,#ff77aa,#ffb4e0);
      box-shadow:0 0 8px rgba(255,105,180,.65);
    }
    h1{
      margin:0 0 8px;
      font-size:26px;
      line-height:1.45;
      letter-spacing:.04em;
    }
    .sub{
      margin:0 0 14px;
      font-size:15px;
      color:var(--muted);
      line-height:1.8;
    }
    .box{
      border-radius:var(--r-lg);
      background:rgba(255,255,255,.97);
      border:1px solid rgba(229,190,216,.9);
      box-shadow:var(--soft);
      padding:14px 14px 16px;
      margin-top:14px;
    }
    .label{
      margin:0 0 6px;
      font-size:13px;
      font-weight:1000;
      color:#b14c7e;
      letter-spacing:.04em;
    }
    .value{
      margin:0;
      font-size:15px;
      line-height:1.9;
      white-space:pre-wrap;
      color:#2f232a;
    }
    .loading{
      display:flex;
      align-items:center;
      gap:10px;
      padding:12px;
      border-radius:18px;
      border:1px dashed #efc2de;
      background:linear-gradient(120deg,#fff7fc,#fffdfc);
    }
    .spinner{
      width:16px;
      height:16px;
      border-radius:99px;
      border:3px solid #f1c6dd;
      border-top-color:#ff86b8;
      animation:spin 1s linear infinite;
      flex:0 0 auto;
    }
    @keyframes spin{
      to{ transform:rotate(360deg); }
    }
    .loading p{
      margin:0;
      font-size:14px;
      color:#5a444f;
      line-height:1.7;
    }
    .error{
      padding:14px;
      border-radius:18px;
      border:1px solid #f1cadc;
      background:#fff7fb;
      color:#7a445f;
      line-height:1.8;
    }
    .btnRow{
      margin-top:18px;
      display:flex;
      flex-wrap:wrap;
      gap:10px;
    }
    .btn{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:11px 16px;
      border-radius:999px;
      border:none;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      color:#fff;
      font-weight:1000;
      font-size:13px;
      letter-spacing:.04em;
      text-decoration:none;
      cursor:pointer;
      box-shadow:0 12px 26px rgba(212,80,140,.35);
    }
    .btn.ghost{
      background:transparent;
      border:1px solid #f0cde2;
      box-shadow:none;
      color:#8a5a72;
    }
    @media (max-width:768px){
      body{ padding:12px 8px 24px; }
      .page{ border-radius:22px; padding:18px 12px 24px; }
      h1{ font-size:22px; }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="chip"><span class="dot"></span>鑑定の続き</div>
    <h1>あなたの無料鑑定の続きです</h1>
    <p class="sub">LINEで届いた専用リンクから開いた方だけ、この続きページを確認できます。</p>

    <div id="loading" class="loading">
      <span class="spinner"></span>
      <p>鑑定データを読み込んでいます…</p>
    </div>

    <div id="error" class="error" style="display:none;"></div>

    <div id="content" style="display:none;">
      <div class="box">
        <p class="label">お名前</p>
        <p class="value" id="name"></p>
      </div>

      <div class="box">
        <p class="label">テーマ</p>
        <p class="value" id="theme"></p>
      </div>

      <div class="box">
        <p class="label">無料鑑定の結論</p>
        <p class="value" id="freeResult"></p>
      </div>

      <div class="box">
        <p class="label">ご案内</p>
        <p class="value">このページは専用リンクから何度でも確認できます。必要ならLINEに戻って、やり取りを続けてください。</p>
      </div>

      <div class="btnRow">
        <a class="btn ghost" href="./">無料鑑定トップへ戻る</a>
      </div>
    </div>
  </main>

  <script>
    var GAS_URL = "https://script.google.com/macros/s/AKfycbzSjdhPUH-aliY08WBqHkYOKx88lH_0zCc5QdyjzzltScTIUKaC59-bVGLremUzMe9U/exec";

    function setError(message){
      document.getElementById("loading").style.display = "none";
      var errorEl = document.getElementById("error");
      errorEl.style.display = "block";
      errorEl.textContent = message;
    }

    async function loadResume(){
      var token = new URLSearchParams(location.search).get("t");

      if(!token){
        setError("無効なリンクです。LINEでもう一度リンクを受け取ってください。");
        return;
      }

      try{
        var res = await fetch(GAS_URL + "?action=lookupResume&t=" + encodeURIComponent(token));
        var json = await res.json();

        if(!json.ok || !json.data){
          setError("鑑定データが見つかりませんでした。LINEでもう一度コードを送ってください。");
          return;
        }

        var data = json.data;
        document.getElementById("name").textContent = data.name || "相談者";
        document.getElementById("theme").textContent = data.theme || "恋愛鑑定";
        document.getElementById("freeResult").textContent = data.freeResult || "";

        document.getElementById("loading").style.display = "none";
        document.getElementById("content").style.display = "block";
      }catch(error){
        setError("読み込みに失敗しました。時間をおいてもう一度お試しください。");
      }
    }

    loadResume();
  </script>
</body>
</html>
